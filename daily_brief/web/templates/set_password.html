{% extends "base.html" %}
{% block content %}
<div class="authbox">
  <h1>{{ 'Change password' if changing else '🧾 Welcome' }}</h1>
  <p class="muted">
    {{ 'Set a new console password.' if changing
       else 'Set a password to protect the console before you start.' }}
  </p>
  <form method="post">
    <input type="password" name="password" placeholder="New password (6+ chars)" autofocus required>
    <input type="password" name="confirm" placeholder="Confirm password" required>
    <button class="btn" type="submit">{{ 'Update' if changing else 'Set password' }}</button>
  </form>
</div>
{% endblock %}
