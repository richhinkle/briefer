name: Build and Deploy Briefer

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: [self-hosted, local]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          python3 -m pip install --break-system-packages -r requirements.txt
          python3 -m pip install --break-system-packages -r requirements-dev.txt

      - name: Run tests
        run: python3 -m pytest tests/ -v

  build-and-deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: [self-hosted, local]
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Synology NAS (hinksynbox)
        env:
          NAS_HOST: ${{ secrets.NAS_HOST }}
          NAS_USER: ${{ secrets.NAS_USER }}
          NAS_PORT: ${{ secrets.NAS_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          echo ">>> Syncing code to NAS..."
          rsync -avz --delete \
            --exclude '.git' \
            --exclude '__pycache__' \
            --exclude '*.pyc' \
            --exclude 'data/' \
            -e "ssh -p ${NAS_PORT}" \
            ./ ${NAS_USER}@${NAS_HOST}:${DEPLOY_PATH}/

          echo ">>> Rebuilding and restarting container..."
          ssh -p ${NAS_PORT} ${NAS_USER}@${NAS_HOST} "
            cd ${DEPLOY_PATH} &&
            sudo /usr/local/bin/docker compose build &&
            sudo /usr/local/bin/docker compose up -d --remove-orphans
          "

          echo ">>> Deploy complete. Briefer running at http://${NAS_HOST}:8080"
