name: Build and Deploy Briefer

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: [self-hosted, local]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          python3 -m pip install --break-system-packages -r requirements.txt
          python3 -m pip install --break-system-packages -r requirements-dev.txt

      - name: Run tests
        run: python3 -m pytest tests/ -v

  build-and-deploy:
    needs: test
    if: |
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, local]
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Synology NAS (hinksynbox)
        env:
          NAS_HOST: ${{ secrets.NAS_HOST }}
          NAS_USER: ${{ secrets.NAS_USER }}
          NAS_PORT: ${{ secrets.NAS_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          echo ">>> Building image on runner (fast CPU)..."
          docker build -t briefer-daily-brief:latest .

          echo ">>> Saving and transferring image to NAS..."
          docker save briefer-daily-brief:latest | ssh -p ${NAS_PORT} ${NAS_USER}@${NAS_HOST} "sudo /usr/local/bin/docker load"

          echo ">>> Syncing compose file and config..."
          rsync -avz \
            --include='docker-compose.yml' \
            --include='config.example.toml' \
            --include='data/***' \
            --exclude='*' \
            -e "ssh -p ${NAS_PORT}" \
            ./ ${NAS_USER}@${NAS_HOST}:${DEPLOY_PATH}/

          echo ">>> Restarting container on NAS..."
          ssh -T -p ${NAS_PORT} ${NAS_USER}@${NAS_HOST} \
            "cd ${DEPLOY_PATH} && mkdir -p data && sudo /usr/local/bin/docker compose down < /dev/null > /dev/null 2>&1; sudo /usr/local/bin/docker compose up -d --remove-orphans < /dev/null > /dev/null 2>&1"

          echo ">>> Deploy complete. Briefer running at http://${NAS_HOST}:8080"
