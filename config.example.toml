# Daily Brief configuration.
#
# Copy this file to `config.toml` and edit it (or use the setup web UI, which
# writes this file for you). `config.toml` is gitignored so your real device
# IDs / API keys / calendar URLs stay local.
#
# Model:  section (a content block) -> brief (an ordered set of sections)
#         -> schedule (prints a brief at a time). Globals below are shared by
#         all briefs.

[printer]
backend = "dummy"          # "dummy" (laptop) | "usb" | "serial"
profile = "default"
# Raster pacing: the bitmap is sent in horizontal bands with a pause between
# them so the printer's buffer can drain. Prevents the opening-burst overrun
# that shifts the first sections sideways. If you still see a shifted print,
# lower band_height and/or raise band_pause; raise band_height to print faster.
band_height = 64           # rows per GS v 0 band
band_pause  = 0.05         # seconds to pause between bands

[printer.usb]
vendor_id  = 0x1d81        # find with: python scripts/printer_test.py --list-usb
product_id = 0x5721

[printer.serial]
port     = "/dev/ttyUSB0"
baudrate = 19200

[location]
lat = 40.4168              # used by weather, daylight, planets
lon = -3.7038
tz  = "Europe/Madrid"

[render]
dot_width    = 384         # 58mm @ 203 dpi (use 576 for 80mm)
body_size    = 22
heading_size = 26
margin       = 8
time_format  = "24h"       # clock display: "24h" (military) or "12h" (am/pm)
temp_unit    = "C"         # weather units: "C" (°C) or "F" (°F)
min_length_mm = 0          # pad short prints with blank feed to this length (mm); 0 = off

[claude]
# `enabled` is the master AI toggle. When on AND a key is set, AI is used by the
# greeting, word of the day, the `ai` section, and Claude ASCII art; if a call
# fails those show "(AI unavailable)" instead of the local version. Turn it off
# (or leave the key unset) to use the local behavior everywhere.
enabled = true
# api_key = "sk-ant-..."
model = "claude-sonnet-4-6"  # or "claude-haiku-4-5" (cheaper), "claude-opus-4-8" (most capable)

[email]
# Print incoming email as it arrives — one receipt per message — independent of
# the briefs/schedules. The daemon polls this mailbox every `poll_seconds` and
# prints each new unread message from an approved sender, then marks it read so
# it prints once. Use a DEDICATED, unpublished mailbox; for Gmail enable IMAP
# and create an App Password (the account password won't work with 2FA).
enabled = false
imap_host = "imap.gmail.com"
imap_port = 993
# username = "myprinter@gmail.com"
# password = "abcd efgh ijkl mnop"        # Gmail App Password
# Only mail From these prints. "@example.com" allows a whole domain.
allowed_senders = []  # e.g. ["alice@example.com", "@family.example"]
require_auth = true    # drop mail failing DKIM/DMARC — blocks most From spoofing
max_chars = 600        # truncate long bodies to this many characters
print_images = true    # render image attachments
mark_read = true       # mark printed messages read (so each prints once)
poll_seconds = 60      # how often to check the mailbox

[network]
# Setup mode (AP + web server). A double-tap of the button re-opens setup after
# WiFi is joined; a single tap reprints the last brief; a 5s hold powers off.
ap_ssid     = "daily-brief-setup"
ap_password = "briefme123"
# Hostname the control console is reachable at (printed on the setup slip and the
# same URL you use day to day). Leave blank to derive "<pi-hostname>.local" from
# the Pi automatically; mDNS (avahi) serves it during setup and on your LAN.
# console_host = "daily-brief.local"
button_gpio = 24

[web]
# The control console runs at all times (password-protected). On first visit
# you set the password; `password_hash` and `secret_key` are then written here
# automatically — don't hand-edit them.
host = "0.0.0.0"
port = 80
# Allow installing an uploaded release tarball from the console's Software page.
# Off by default — running an arbitrary uploaded build is risky. Turn it on only
# when you intend to push a remote update, then turn it back off.
# allow_remote_update = false

# ---------------------------------------------------------------------------
# Briefs. Each is a named, ordered set of sections (file order = print order).
# Disable a section with `enabled = false`. Header icons are off by default
# except birthdays; add `icon = "<key>"` to any section to show one.
# ---------------------------------------------------------------------------

[[briefs]]
name = "morning"

  [[briefs.sections]]
  type = "greeting"          # the big header: greeting + date line
  use_claude = true          # AI greeting when AI is on; else a rotating built-in
  style = "morning"          # morning | afternoon | evening | weekend
  # prompt = "..."           # custom AI prompt (overrides style)
  date_format = "%A, %d %B %Y"   # strftime; add " · %H:%M" to show the time

  [[briefs.sections]]
  type = "weather"
  api_key = "YOUR_OPENWEATHERMAP_KEY"

  [[briefs.sections]]
  type = "birthdays"
  ical_url = "https://calendar.google.com/calendar/ical/.../basic.ics"
  horizon_days = 0
  checkbox = true

  [[briefs.sections]]
  type = "events"
  title = "UPCOMING"
  ical_url = "https://calendar.google.com/calendar/ical/.../basic.ics"
  horizon_days = 3
  max_items = 6

  [[briefs.sections]]
  type = "lirr"               # next LIRR trains between two stations (live delays)
  title = "LIRR"
  origin = "Port Washington"
  destination = "Penn Station"
  count = 4
  realtime = true

  [[briefs.sections]]
  type = "oncall"
  title = "ON CALL"
  ical_url = "https://calendar.google.com/calendar/ical/.../basic.ics"
  keyword = "primary"
  horizon_days = 14

  [[briefs.sections]]
  type = "onthisday"
  title = "ON THIS DAY"
  max_items = 1
  min_age_years = 50

  [[briefs.sections]]
  type = "word"
  title = "WORD OF THE DAY"
  use_claude = true        # AI definition + example (when AI is on); else free dictionary

  [[briefs.sections]]
  type = "daylight"
  title = "DAYLIGHT"

  # Space sections (each optional): moon phase, ISS map, tonight's planets.
  [[briefs.sections]]
  type = "moon"
  title = "MOON PHASE"

  # Add these too if you like:
  # [[briefs.sections]]
  # type = "iss"
  # title = "ISS TRACKER"
  #
  # [[briefs.sections]]
  # type = "planets"
  # title = "TONIGHT'S PLANETS"

  [[briefs.sections]]
  type = "ascii"
  title = "ASCII ART"
  # use_claude = true
  # subject = "a sailboat"

  [[briefs.sections]]
  type = "joke"
  title = "DAD JOKE"

  # A daily sudoku puzzle (free Dosuku API, no key needed).
  # [[briefs.sections]]
  # type = "sudoku"
  # title = "DAILY SUDOKU"
  # show_solution = true

  # The latest xkcd comic (updates Mon/Wed/Fri, no key needed).
  # [[briefs.sections]]
  # type = "xkcd"
  # title = "XKCD"
  # show_alt = true

  # Days remaining until a target date. Disappears once the date has passed; on
  # the day itself it prints `arrived_message`. A progress bar (start -> target)
  # is optional and needs `start_date`.
  # [[briefs.sections]]
  # type = "countdown"
  # title = "COUNTDOWN"
  # target_date = "2026-12-25"
  # label = "Christmas"
  # arrived_message = "Merry Christmas!"
  # progress_bar = true
  # start_date = "2026-12-01"

# A tiny second brief, for a midday pick-me-up.
[[briefs]]
name = "midday-joke"

  [[briefs.sections]]
  type = "joke"
  title = "MIDDAY JOKE"

# ---------------------------------------------------------------------------
# Schedules: print a brief at a time. `days` omitted = every day.
# ---------------------------------------------------------------------------

[[schedules]]
name = "Morning brief"
brief = "morning"
time = "07:30"
enabled = true

[[schedules]]
name = "Midday joke"
brief = "midday-joke"
time = "12:00"
days = ["mon", "tue", "wed", "thu", "fri"]
enabled = true
