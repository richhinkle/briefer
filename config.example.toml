# Daily Brief configuration.
#
# Copy this file to `config.toml` and edit it (or use the setup web UI, which
# writes this file for you). `config.toml` is gitignored so your real device
# IDs / API keys / calendar URLs stay local.
#
# Model:  section (a content block) -> brief (an ordered set of sections)
#         -> schedule (prints a brief at a time). Globals below are shared by
#         all briefs.

[printer]
backend = "dummy"          # "dummy" (laptop) | "usb" | "serial"
profile = "default"

[printer.usb]
vendor_id  = 0x1d81        # find with: python scripts/printer_test.py --list-usb
product_id = 0x5721

[printer.serial]
port     = "/dev/ttyUSB0"
baudrate = 19200

[location]
lat = 40.4168              # used by weather, daylight, planets
lon = -3.7038
tz  = "Europe/Madrid"

[render]
dot_width    = 384         # 58mm @ 203 dpi (use 576 for 80mm)
body_size    = 22
heading_size = 26
margin       = 8

[claude]
# `enabled` is the master AI toggle. When on AND a key is set, AI is used by the
# greeting, word of the day, the `ai` section, and Claude ASCII art; if a call
# fails those show "(AI unavailable)" instead of the local version. Turn it off
# (or leave the key unset) to use the local behavior everywhere.
enabled = true
# api_key = "sk-ant-..."
model = "claude-opus-4-8"  # or "claude-haiku-4-5" (cheaper)

[network]
# Setup mode (AP + web server). The button re-opens setup after WiFi is joined.
ap_ssid     = "daily-brief-setup"
ap_password = "briefme123"
button_gpio = 17

[web]
# The control console runs at all times (password-protected). On first visit
# you set the password; `password_hash` and `secret_key` are then written here
# automatically — don't hand-edit them.
host = "0.0.0.0"
port = 80

# ---------------------------------------------------------------------------
# Briefs. Each is a named, ordered set of sections (file order = print order).
# Disable a section with `enabled = false`. Header icons are off by default
# except birthdays; add `icon = "<key>"` to any section to show one.
# ---------------------------------------------------------------------------

[[briefs]]
name = "morning"

  [[briefs.sections]]
  type = "greeting"          # the big header: greeting + date line
  use_claude = true          # AI greeting when AI is on; else a rotating built-in
  style = "morning"          # morning | afternoon | evening | weekend
  # prompt = "..."           # custom AI prompt (overrides style)
  date_format = "%A, %d %B %Y"   # strftime; add " · %H:%M" to show the time

  [[briefs.sections]]
  type = "weather"
  api_key = "YOUR_OPENWEATHERMAP_KEY"

  [[briefs.sections]]
  type = "birthdays"
  ical_url = "https://calendar.google.com/calendar/ical/.../basic.ics"
  horizon_days = 0
  checkbox = true

  [[briefs.sections]]
  type = "events"
  title = "UPCOMING"
  ical_url = "https://calendar.google.com/calendar/ical/.../basic.ics"
  horizon_days = 3
  max_items = 6

  [[briefs.sections]]
  type = "oncall"
  title = "ON CALL"
  ical_url = "https://calendar.google.com/calendar/ical/.../basic.ics"
  keyword = "primary"
  horizon_days = 14

  [[briefs.sections]]
  type = "onthisday"
  title = "ON THIS DAY"
  max_items = 1
  min_age_years = 50

  [[briefs.sections]]
  type = "word"
  title = "WORD OF THE DAY"
  use_claude = true        # AI definition + example (when AI is on); else free dictionary

  [[briefs.sections]]
  type = "daylight"
  title = "DAYLIGHT"

  # Space sections (each optional): moon phase, ISS map, tonight's planets.
  [[briefs.sections]]
  type = "moon"
  title = "MOON PHASE"

  # Add these too if you like:
  # [[briefs.sections]]
  # type = "iss"
  # title = "ISS TRACKER"
  #
  # [[briefs.sections]]
  # type = "planets"
  # title = "TONIGHT'S PLANETS"

  [[briefs.sections]]
  type = "ascii"
  title = "ASCII ART"
  # use_claude = true
  # subject = "a sailboat"

  [[briefs.sections]]
  type = "joke"
  title = "DAD JOKE"

# A tiny second brief, for a midday pick-me-up.
[[briefs]]
name = "midday-joke"

  [[briefs.sections]]
  type = "joke"
  title = "MIDDAY JOKE"

# ---------------------------------------------------------------------------
# Schedules: print a brief at a time. `days` omitted = every day.
# ---------------------------------------------------------------------------

[[schedules]]
name = "Morning brief"
brief = "morning"
time = "07:30"
enabled = true

[[schedules]]
name = "Midday joke"
brief = "midday-joke"
time = "12:00"
days = ["mon", "tue", "wed", "thu", "fri"]
enabled = true
